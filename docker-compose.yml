services:
  backend:
    image: ghcr.io/felix2yu/bili-history-fetcher:latest
    container_name: bili-history-backend
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./output:/app/output
    expose:
      - "8899"
    environment:
      - TZ=Asia/Shanghai
      - DOCKER_ENV=true

  frontend:
    image: ghcr.io/felix2yu/bili-history-frontend:latest
    container_name: bili-history-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
      - NUXT_BACKEND_URL=http://backend:8899
      - NUXT_PUBLIC_DEFAULT_BACKEND_URL=/api
      - NODE_ENV=production
