version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8899:8899"
    volumes:
      - ./backend/config:/app/config
      - ./backend/output:/app/output
    environment:
      - TZ=Asia/Shanghai
      - DOCKER_ENV=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_BACKEND_URL=http://backend:8899
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
